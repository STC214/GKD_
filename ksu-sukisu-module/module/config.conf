# Runtime switches used by service.sh.
# Edit /data/adb/modules/gkd_ksu_sukisu/config.conf after flashing.

GKD_PACKAGE=li.songe.gkd
GKD_AUTO_INSTALL=1
GKD_AUTO_GRANT=1
GKD_AUTO_ENABLE_A11Y=0
# 1 = start GKD process in background after boot without showing the app UI.
GKD_AUTO_START=1
# 1 = periodically recover the GKD process/status service after a ROM kills it.
GKD_KEEP_ALIVE=1
# Watchdog interval in seconds; values below 60 are clamped to 60.
GKD_KEEP_ALIVE_INTERVAL=300
# Reapply background permissions/AppOps and the battery whitelist periodically.
GKD_REGRANT_INTERVAL=1800
GKD_REQUIRE_BUNDLED_APK=0
GKD_UNINSTALL_ON_REMOVE=1
