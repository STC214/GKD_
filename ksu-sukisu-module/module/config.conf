# Pure keep-alive settings used by service.sh.
# Edit /data/adb/modules/gkd_ksu_sukisu/config.conf after flashing.

GKD_PACKAGE=li.songe.gkd
# Android user containing the GKD instance to keep alive.
GKD_USER_ID=0
# Package-missing sleep and running-process watchdog interval in seconds;
# valid range: 60..86400.
GKD_KEEP_ALIVE_INTERVAL=300
# Reapply background AppOps and the battery whitelist; valid range:
# 300..604800 seconds.
GKD_POLICY_REFRESH_INTERVAL=1800
# Rotate service.log after it exceeds this size in bytes; valid range:
# 4096..10485760. Invalid values fall back to 262144.
GKD_LOG_MAX_BYTES=262144
