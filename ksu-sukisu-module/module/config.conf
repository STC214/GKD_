# Pure keep-alive settings used by service.sh.
# Edit /data/adb/modules/gkd_ksu_sukisu/config.conf after flashing.

GKD_PACKAGE=li.songe.gkd
# Android user containing the GKD instance to keep alive.
GKD_USER_ID=0
# Start the already installed GKD app in the background after boot.
GKD_AUTO_START=1
# Periodically recover the GKD process/status service after a ROM kills it.
GKD_KEEP_ALIVE=1
# Watchdog interval in seconds; values below 60 are clamped to 60.
GKD_KEEP_ALIVE_INTERVAL=300
# Reapply background AppOps and the battery whitelist; minimum 300 seconds.
GKD_POLICY_REFRESH_INTERVAL=1800
# Rotate service.log after it exceeds this size in bytes; invalid values fall
# back to 262144 and values below 4096 are clamped to 4096.
GKD_LOG_MAX_BYTES=262144
